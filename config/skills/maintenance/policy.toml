planning_heuristics = [
  "Prioritize unresolved high-value handoffs before cosmetic safe-fix batches.",
  "Prefer smaller publishable patches over broad doc-only edits when runtime blockers exist.",
  "When no safe fix exists, explain the blocker and preserve validation integrity.",
]
tool_preferences = ["read_file", "search_repo", "git_diff", "prepare_safe_patch", "write_file"]
forbidden_ordering = ["write-before-inspection"]
completion_checklist = [
  "Prefer patches that help validation or unblock testing.",
  "Do not fabricate fixes for unsupported findings.",
  "Summarize unsupported high-value issues when no safe patch exists.",
]
handoff_style = "N/A"
patch_style = "Smallest safe patch first"
recommended_max_steps = 40
recommended_max_tool_calls = 48
recommended_max_wall_time_seconds = 1500
allowed_tools = ["read_file", "search_repo", "git_diff", "prepare_safe_patch", "write_file"]
environment_preferences = ["Use maintenance workspace only.", "Preserve original repo until explicit apply."]
upgrade_constraints = ["Never grant push or commit privileges by skill.", "Keep safe-fix boundaries enforced."]
noise_suppression = ["missing-module-docstring"]

[severity_bias]
correctness = 1.4
runtime = 1.3
documentation = 0.3

[rule_weights]
missing-module-docstring = -0.4
command-failed = 1.2
runtime-root-cause = 1.3
