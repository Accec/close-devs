[app]
repo_root = "."
state_dir = "state"
reports_dir = "reports"
scan_interval_minutes = 60
log_level = "INFO"
log_agent_activity = true
auto_apply_patch = false
rules_path = "config/rules.toml"
include = ["*.py", "**/*.py", "pyproject.toml", "README.md"]
exclude = [
  ".git/**",
  ".venv/**",
  "reports/**",
  "state/**",
  "__pycache__/**",
  ".pytest_cache/**",
  ".mypy_cache/**",
]

[llm]
provider = "openai_compatible"
model = "gpt-5.4"
base_url = "https://api.openai.com/v1"
api_key_env = "OPENAI_API_KEY"
timeout_seconds = 30
temperature = 0.0
system_prompt = "You are the Close-Devs maintenance planning model. Produce concise repo maintenance rationale and suggestions."

[static_review]
max_complexity = 10
ruff_command = "ruff check"
mypy_command = "mypy"
bandit_command = "bandit -q -r"

[dynamic_debug]
smoke_commands = []
test_commands = ["python3 -m pytest -q"]
timeout_seconds = 120

[github]
provider = "github_actions"
repo_full_name = ""
base_branch = "main"
token_env = "GITHUB_TOKEN"
bot_branch_prefix = "close-devs/fix"
companion_pr_label = "close-devs"
review_mode = "review"
artifact_retention_days = 7

[pr_workflow]
inline_comment_limit = 5
allow_companion_pr = true
safe_fix_only = true
issue_comment_trigger = "/close-devs rerun"

[database]
backend = "postgres"
url = "postgres://close_devs:close_devs@127.0.0.1:5432/close_devs"
url_env = "DATABASE_URL"
echo = false

[environment]
enabled = true
scope = "all_analysis"
install_mode = "auto_detect"
install_fail_policy = "mark_degraded"
python_executable = "python3"
bootstrap_tools = true

[skills]
enabled = true
repo_root = "config/skills"
shadow_evaluation_enabled = true
min_shadow_runs = 5
promotion_margin = 0.10

[skills.static]
baseline = "baseline"
auto_upgrade = true

[skills.dynamic]
baseline = "baseline"
auto_upgrade = true

[skills.maintenance]
baseline = "baseline"
auto_upgrade = true

[agents.static]
model = "gpt-5.4"
max_steps = 24
max_tool_calls = 32
max_wall_time_seconds = 900
max_consecutive_failures = 3
max_budget_ceiling = 24
safety_lock = true
allowed_tools = [
  "read_file",
  "search_repo",
  "git_diff",
  "ast_summary",
  "run_static_review",
  "shell_readonly",
]
allowed_tool_superset = [
  "read_file",
  "search_repo",
  "git_diff",
  "ast_summary",
  "run_static_review",
  "shell_readonly",
]

[agents.dynamic]
model = "gpt-5.4"
max_steps = 32
max_tool_calls = 40
max_wall_time_seconds = 1200
max_consecutive_failures = 4
max_budget_ceiling = 32
safety_lock = true
allowed_tools = [
  "read_file",
  "search_repo",
  "run_test_command",
  "parse_traceback",
  "shell_readonly",
]
allowed_tool_superset = [
  "read_file",
  "search_repo",
  "run_test_command",
  "parse_traceback",
  "shell_readonly",
]

[agents.maintenance]
model = "gpt-5.4"
max_steps = 40
max_tool_calls = 48
max_wall_time_seconds = 1500
max_consecutive_failures = 4
max_budget_ceiling = 40
safety_lock = true
allowed_tools = [
  "read_file",
  "search_repo",
  "git_diff",
  "prepare_safe_patch",
  "write_file",
]
allowed_tool_superset = [
  "read_file",
  "search_repo",
  "git_diff",
  "prepare_safe_patch",
  "write_file",
]
